<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Minuta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:white;border-radius:12px;padding:40px;width:100%;max-width:380px;box-shadow:0 2px 20px rgba(0,0,0,0.08)}
.login-card h1{font-size:18px;font-weight:600;margin-bottom:6px;color:#1a1a1a}
.login-card p{font-size:13px;color:#666;margin-bottom:24px}
.app{display:none;grid-template-columns:300px 1fr;min-height:100vh}
.side{background:white;border-right:1px solid #eee;display:flex;flex-direction:column;padding:16px;gap:12px;overflow-y:auto}
.side h2{font-size:13px;font-weight:600;color:#1a1a1a;padding-bottom:8px;border-bottom:1px solid #eee}
.main{display:flex;flex-direction:column;padding:20px;gap:16px}
label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:4px}
input,textarea,select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a1a}
textarea{resize:vertical;min-height:60px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.upload-area{border:1px dashed #ccc;border-radius:8px;padding:10px;text-align:center;cursor:pointer;font-size:12px;color:#888;transition:all .15s}
.upload-area:hover{border-color:#4f46e5;color:#4f46e5;background:#f5f3ff}
.pill{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:11px;color:#166534;margin-top:4px}
.pill span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-rm{cursor:pointer;opacity:.5;flex-shrink:0}.pill-rm:hover{opacity:1}
.btn-gen{width:100%;padding:11px;background:#4f46e5;border:none;border-radius:8px;color:white;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-gen:hover:not(:disabled){opacity:.85}.btn-gen:disabled{opacity:.4;cursor:not-allowed}
.btn-sec{width:100%;padding:8px;background:transparent;border:1px solid #ddd;border-radius:8px;color:#555;font-size:12px;cursor:pointer;margin-top:6px}
.btn-sec:hover{background:#f5f5f5}
.out-card{background:white;border-radius:12px;padding:20px;flex:1}
.out-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#1a1a1a}
.log{font-family:monospace;font-size:11px;line-height:1.8;white-space:pre-wrap;background:#f9f9f9;border-radius:8px;padding:10px;min-height:120px;color:#555}
.minuta{font-family:'Times New Roman',serif;font-size:12px;line-height:1.7;white-space:pre-wrap;color:#1a1a1a}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;color:#666;background:transparent;border:1px solid transparent}
.tab.on{background:#4f46e5;color:white}
.tab:not(.on):hover{background:#f5f5f5}
.pane{display:none}.pane.on{display:block}
.status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px}
.status.ok{background:#f0fdf4;color:#166534}
.status.err{background:#fef2f2;color:#991b1b}
.status.wait{background:#fafaf0;color:#854d0e}
.spin{display:inline-block;width:12px;height:12px;border:2px solid #ccc;border-top-color:#4f46e5;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.warn{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 10px;font-size:11px;color:#92400e;margin-top:6px;display:none}
</style>
</head>
<body>

<div class="login" id="login-screen">
  <div class="login-card">
    <h1>Agente Minuta</h1>
    <p>F-35 JSF &middot; Eglin AFB &middot; Inserisci la tua chiave di accesso</p>
    <div style="margin-bottom:12px">
      <label>Chiave di accesso</label>
      <input type="password" id="key-input" placeholder="RMI-EGLIN-..." onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-gen" onclick="doLogin()">Accedi</button>
    <div id="login-err" style="display:none;margin-top:10px;font-size:12px;color:#991b1b;text-align:center"></div>
  </div>
</div>

<div class="app" id="app-screen">
  <div class="side">
    <h2>Agente Minuta</h2>

    <div>
      <label>1 — Briefing PDF</label>
      <div class="upload-area" onclick="document.getElementById('i-pdf').click()">+ Aggiungi PDF</div>
      <input type="file" id="i-pdf" accept=".pdf" multiple style="display:none">
      <div id="pdf-list"></div>
      <div class="warn" id="pdf-warn">PDF.js non disponibile — incolla il testo del briefing negli appunti</div>
    </div>

    <div>
      <label>2 — Appunti / trascrizione <span style="font-weight:400;color:#aaa">(opz.)</span></label>
      <textarea id="m-txt" rows="4" placeholder="Incolla trascrizione o appunti..."></textarea>
    </div>

    <div>
      <label>3 — Dati riunione</label>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div><label>Oggetto</label><input type="text" id="m-ogg" value=""></div>
        <div class="g2">
          <div><label>Data inizio</label><input type="date" id="m-di"></div>
          <div><label>Data fine</label><input type="date" id="m-df"></div>
        </div>
        <div><label>Luogo</label><input type="text" id="m-luo" value=""></div>
        <div><label>Partecipanti italiani</label><textarea id="m-par" rows="2"></textarea></div>
        <div><label>Note / evidenziare</label><textarea id="m-note" rows="2" placeholder=""></textarea></div>
      </div>
    </div>

    <div style="margin-top:auto">
      <button class="btn-gen" id="g-btn" onclick="genera()">⚡ Genera Minuta</button>
      <button class="btn-sec" id="dl-btn" style="display:none" onclick="scarica()">⬇ Scarica .doc</button>
      <button class="btn-sec" onclick="reset()">↺ Ricomincia</button>
    </div>
  </div>

  <div class="main">
    <div class="out-card">
      <div class="tabs">
        <div class="tab on" onclick="showTab('t-out',this)">Minuta</div>
        <div class="tab" onclick="showTab('t-log',this)">Log</div>
      </div>
      <div id="status-box" style="display:none"></div>
      <div class="pane on" id="t-out">
        <div style="color:#aaa;font-size:13px;text-align:center;padding:40px 0">
          Carica il briefing e premi Genera Minuta
        </div>
      </div>
      <div class="pane" id="t-log">
        <div class="log" id="log-out">Nessun processo avviato.</div>
      </div>
    </div>
  </div>
</div>

<script>
const SERVER = 'https://app-riunione.onrender.com';
let apiKey = '';
let pdfs = [];

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function doLogin() {
  const k = document.getElementById('key-input').value.trim();
  if (!k) return;
  try {
    const r = await fetch(SERVER + '/health', { headers: { 'X-API-Key': k } });
    if (r.ok) {
      apiKey = k;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'grid';
      const t = new Date().toISOString().split('T')[0];
      document.getElementById('m-di').value = t;
      document.getElementById('m-df').value = t;
    } else {
      document.getElementById('login-err').style.display = 'block';
      document.getElementById('login-err').textContent = 'Chiave non valida.';
    }
  } catch(e) {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('login-err').textContent = 'Server non raggiungibile. Riprova tra poco.';
  }
}

document.getElementById('i-pdf').addEventListener('change', async function() {
  const files = Array.from(this.files);
  const existing = new Set(pdfs.map(p => p.name));
  for (const f of files) {
    if (existing.has(f.name)) continue;
    pdfs.push({ name: f.name, size: f.size, text: null });
    renderPdfs();
    try {
      const ab = await f.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const c = await page.getTextContent();
        text += '\n[P' + i + '] ' + c.items.map(it => it.str).join(' ');
      }
      const idx = pdfs.findIndex(p => p.name === f.name);
      if (idx >= 0) pdfs[idx].text = text;
      renderPdfs();
      log('✓ ' + f.name + ' — ' + text.split(/\s+/).length.toLocaleString('it-IT') + ' parole');
    } catch(e) {
      log('Errore PDF ' + f.name + ': ' + e.message, 'e');
    }
  }
  this.value = '';
});

function renderPdfs() {
  document.getElementById('pdf-list').innerHTML = pdfs.map((p, i) =>
    `<div class="pill"><span title="${p.name}">${p.name.length > 26 ? p.name.slice(0,23)+'...' : p.name}</span>` +
    `<span style="opacity:.5;font-size:10px">${p.text ? '✓' : '...'}</span>` +
    `<span class="pill-rm" onclick="removePdf(${i})">✕</span></div>`
  ).join('');
}

function removePdf(i) { pdfs.splice(i, 1); renderPdfs(); }

function showTab(id, btn) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
}

function log(msg, type) {
  const el = document.getElementById('log-out');
  const tm = new Date().toLocaleTimeString('it-IT');
  el.textContent += '[' + tm + '] ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg, type) {
  const el = document.getElementById('status-box');
  el.style.display = 'flex';
  el.className = 'status ' + (type || 'wait');
  el.innerHTML = (type === 'wait' ? '<span class="spin"></span>' : '') + msg;
}

function fmtD(d) {
  if (!d) return '';
  const [y, m, dd] = d.split('-');
  const mn = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  return parseInt(dd) + ' ' + mn[parseInt(m)-1] + ' ' + y;
}

function trunc(text, max = 50000) {
  if (text.length <= max) return text;
  const k1 = Math.floor(max * .65), k2 = max - k1;
  return text.slice(0, k1) + '\n\n[...omesso...]\n\n' + text.slice(-k2);
}

async function genera() {
  const readyPdfs = pdfs.filter(p => p.text);
  const manTxt = document.getElementById('m-txt').value.trim();
  if (!readyPdfs.length && !manTxt) {
    alert('Carica almeno un PDF o incolla degli appunti.');
    return;
  }

  document.getElementById('g-btn').disabled = true;
  document.getElementById('log-out').textContent = '';
  showTab('t-log', document.querySelectorAll('.tab')[1]);
  log('Avvio generazione...');
  setStatus('Preparazione prompt...', 'wait');

  const ogg = document.getElementById('m-ogg').value;
  const luo = document.getElementById('m-luo').value;
  const par = document.getElementById('m-par').value;
  const note = document.getElementById('m-note').value;
  const di = document.getElementById('m-di').value;
  const df = document.getElementById('m-df').value;
  const dateStr = di && df ? 'dal ' + fmtD(di) + ' al ' + fmtD(df) : di ? 'il ' + fmtD(di) : '[DATA]';

  let contenuto = '';
  if (readyPdfs.length) {
    const perPdf = Math.floor(50000 / readyPdfs.length);
    contenuto = readyPdfs.map(p => '=== BRIEFING: ' + p.name + ' ===\n' + trunc(p.text, perPdf)).join('\n\n');
  }
  if (manTxt) contenuto += '\n\n=== APPUNTI ===\n' + manTxt;

  const prompt = `Sei CF Paolo LAZZERETTI, compilatore della RMI presso Eglin AFB, programma F-35/JSF.

Genera un RESOCONTO SOMMARIO DI RIUNIONE ufficiale in italiano.

DATI:
- Oggetto: ${ogg}
- Date: ${dateStr}
- Luogo: ${luo}
- Partecipanti italiani (SOLO questi): ${par}
${note ? '- Evidenziare: ' + note : ''}

STRUTTURA OBBLIGATORIA:
---
MINISTERO DELLA DIFESA
DIREZIONE NAZIONALE DEGLI ARMAMENTI
- II REPARTO – COORDINAMENTO PROGRAMMI DI ARMAMENTO -
- Direzione di Programma JSF -

RESOCONTO SOMMARIO DI RIUNIONE

Oggetto: ${ogg} – ${dateStr}.

# Scopo, data e luogo
[4-6 righe: dove, quando, chi partecipa, obiettivo]

# Partecipanti
Per l'Italia hanno preso parte ${par}.

# Discussione
Di seguito una sintesi dei contenuti discussi relativamente agli argomenti di maggiore interesse nazionale:

[Per ogni argomento:
a. TITOLO IN MAIUSCOLO
> [paragrafi fluenti, termini inglesi in corsivo (*termine*), dati precisi, impatti Italia]]

# Conclusioni
[4-5 righe: importanza, risultati, azioni richieste]

*Il Compilatore*
*CF Paolo LAZZERETTI*
*Visto:*
*Col. Alberto FACCINI*
---

REGOLE: termini tecnici inglesi in corsivo; registro formale militare italiano; SOLO i partecipanti indicati; "formazione continua" mai "formazione di continuazione"; italiano elegante e corretto.

CONTENUTO:
${contenuto}`;

  log('Invio al server (' + contenuto.length.toLocaleString('it-IT') + ' car.)...');
  setStatus('Elaborazione in corso...', 'wait');

  try {
    const r = await fetch(SERVER + '/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
      body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
    });
    if (!r.ok) throw new Error('Errore server: ' + r.status);
    const data = await r.json();
    const testo = data.content;
    log('Minuta ricevuta — ' + testo.length.toLocaleString('it-IT') + ' caratteri.');
    setStatus('Minuta generata con successo.', 'ok');
    document.getElementById('t-out').innerHTML = '<div class="minuta">' + testo.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
    document.getElementById('dl-btn').style.display = 'block';
    document.getElementById('dl-btn').setAttribute('data-testo', testo);
    showTab('t-out', document.querySelectorAll('.tab')[0]);
  } catch(e) {
    log('ERRORE: ' + e.message, 'e');
    setStatus('Errore: ' + e.message, 'err');
  } finally {
    document.getElementById('g-btn').disabled = false;
  }
}

function scarica() {
  const testo = document.getElementById('dl-btn').getAttribute('data-testo');
  const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:"Times New Roman",serif;font-size:11pt;margin:2cm;line-height:1.6}h1,h2{font-size:11pt;font-weight:bold}p{text-align:justify;margin-bottom:6px}blockquote{margin-left:1.2cm}</style></head><body>' + testo.replace(/\n/g,'<br>') + '</body></html>';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], { type: 'application/msword' }));
  const ogg = document.getElementById('m-ogg').value.replace(/\s+/g,'_').slice(0,20);
  const data = document.getElementById('m-di').value.replace(/-/g,'') || 'DATA';
  a.download = 'Minuta_' + ogg + '_' + data + '.doc';
  a.click();
  URL.revokeObjectURL(a.href);
}

function reset() {
  pdfs = [];
  renderPdfs();
  document.getElementById('m-txt').value = '';
  document.getElementById('log-out').textContent = 'Nessun processo avviato.';
  document.getElementById('t-out').innerHTML = '<div style="color:#aaa;font-size:13px;text-align:center;padding:40px 0">Carica il briefing e premi Genera Minuta</div>';
  document.getElementById('status-box').style.display = 'none';
  document.getElementById('dl-btn').style.display = 'none';
  document.getElementById('g-btn').disabled = false;
}
</script>
</body>
</html>
